<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
<title id="title">Synthetic Incident Capsule report preview</title>
<desc id="desc">Dark offline response report with case metadata, collector states, host metrics, and warnings.</desc>
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0f2630"/><stop offset=".45" stop-color="#071015"/><stop offset="1" stop-color="#071015"/></linearGradient>
  <filter id="shadow"><feDropShadow dx="0" dy="12" stdDeviation="16" flood-opacity=".32"/></filter>
</defs>
<rect width="1200" height="620" rx="18" fill="url(#bg)"/>
<g font-family="Consolas, ui-monospace, monospace">
  <rect x="42" y="38" width="1116" height="92" rx="8" fill="#0d1820" stroke="#29414d" filter="url(#shadow)"/>
  <rect x="42" y="38" width="1116" height="4" rx="2" fill="#68f0ae"/>
