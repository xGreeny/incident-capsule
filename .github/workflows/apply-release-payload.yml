name: Apply release payload

on:
  push:
    branches:
      - release/v1.0.1
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: >-
      (github.event_name == 'push' && contains(github.event.head_commit.message, '[bootstrap-v1.0.1]')) ||
      (github.event_name == 'pull_request' && github.head_ref == 'release/v1.0.1')
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out release branch
        uses: actions/checkout@v7
        with:
          ref: release/v1.0.1

      - name: Reconstruct and apply payload
        shell: bash
        run: |
          set -euo pipefail

          cat \
            .release-payload/chunk-00a \
            .release-payload/chunk-00b \
            .release-payload/chunk-01 \
            .release-payload/chunk-02 \
            .release-payload/chunk-03 \
            .release-payload/chunk-04 \
            .release-payload/chunk-05 \
            .release-payload/chunk-06a \
            .release-payload/chunk-06b \
            .release-payload/chunk-07 \
            | base64 --decode > /tmp/incident-capsule-v1.0.1-changes.zip

          unzip -o /tmp/incident-capsule-v1.0.1-changes.zip -d .
          rm -rf .release-payload

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Release Incident Capsule v1.0.1"
          git push origin HEAD:release/v1.0.1
