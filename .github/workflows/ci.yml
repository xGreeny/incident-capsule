name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  PESTER_VERSION: '5.9.0'
  PSSCRIPTANALYZER_VERSION: '1.25.0'

jobs:
  static-analysis:
    name: Static analysis
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          Set-PSRepository `
            -Name PSGallery `
            -InstallationPolicy Trusted

          Install-Module `
            -Name PSScriptAnalyzer `
            -RequiredVersion $env:PSSCRIPTANALYZER_VERSION `
            -Scope CurrentUser `
            -Force `
            -AllowClobber

          Import-Module `
            -Name PSScriptAnalyzer `
            -RequiredVersion $env:PSSCRIPTANALYZER_VERSION `
            -Force `
            -ErrorAction Stop

          Write-Host "PSScriptAnalyzer version: $((Get-Module PSScriptAnalyzer).Version)"

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: ./build.ps1 -Task Analyze

  test-windows-powershell:
    name: Pester / Windows PowerShell 5.1
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install Pester
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12

          Set-PSRepository `
            -Name PSGallery `
            -InstallationPolicy Trusted

          Install-Module `
            -Name Pester `
            -RequiredVersion $env:PESTER_VERSION `
            -Scope CurrentUser `
            -Force `
            -SkipPublisherCheck `
            -AllowClobber

          Import-Module `
            -Name Pester `
            -RequiredVersion $env:PESTER_VERSION `
            -Force `
            -ErrorAction Stop

          Write-Host "Pester version: $((Get-Module Pester).Version)"

      - name: Run Pester
        shell: powershell
        run: ./build.ps1 -Task Test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-windows-powershell
          path: out/TestResults-*.xml
          if-no-files-found: warn
          retention-days: 14

  test-pwsh:
    name: Pester / PowerShell 7
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install Pester
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          Set-PSRepository `
            -Name PSGallery `
            -InstallationPolicy Trusted

          Install-Module `
            -Name Pester `
            -RequiredVersion $env:PESTER_VERSION `
            -Scope CurrentUser `
            -Force `
            -SkipPublisherCheck `
            -AllowClobber

          Import-Module `
            -Name Pester `
            -RequiredVersion $env:PESTER_VERSION `
            -Force `
            -ErrorAction Stop

          Write-Host "Pester version: $((Get-Module Pester).Version)"

      - name: Run Pester
        shell: pwsh
        run: ./build.ps1 -Task Test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-pwsh
          path: out/TestResults-*.xml
          if-no-files-found: warn
          retention-days: 14

  package-smoke:
    name: Package / extracted artifact smoke test
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Build and smoke-test release package
        shell: pwsh
        run: ./build.ps1 -Task Package

      - name: Upload validated package
        uses: actions/upload-artifact@v7
        with:
          name: incident-capsule-package
          path: |
            out/incident-capsule-*.zip
            out/incident-capsule-*.zip.sha256
          if-no-files-found: error
          retention-days: 14
