name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

env:
  PESTER_VERSION: '5.9.0'
  PSSCRIPTANALYZER_VERSION: '1.25.0'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate-package:
    name: Validate, package and attest
    runs-on: windows-latest
    timeout-minutes: 35
    permissions:
      contents: read
      id-token: write
      attestations: write
      artifact-metadata: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install pinned build dependencies
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          Set-PSRepository `
            -Name PSGallery `
            -InstallationPolicy Trusted

          Install-Module `
            -Name Pester `
            -RequiredVersion $env:PESTER_VERSION `
            -Scope CurrentUser `
            -Force `
            -SkipPublisherCheck `
            -AllowClobber

          Install-Module `
            -Name PSScriptAnalyzer `
            -RequiredVersion $env:PSSCRIPTANALYZER_VERSION `
            -Scope CurrentUser `
            -Force `
            -AllowClobber

          Import-Module `
            -Name Pester `
            -RequiredVersion $env:PESTER_VERSION `
            -Force `
            -ErrorAction Stop

          Import-Module `
            -Name PSScriptAnalyzer `
            -RequiredVersion $env:PSSCRIPTANALYZER_VERSION `
            -Force `
            -ErrorAction Stop

          Write-Host "Pester version: $((Get-Module Pester).Version)"
          Write-Host "PSScriptAnalyzer version: $((Get-Module PSScriptAnalyzer).Version)"

      - name: Validate and package tagged version
        shell: pwsh
        run: ./build.ps1 -Task All -ReleaseTag $env:GITHUB_REF_NAME

      - name: Stage curated release notes
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $tag = $env:GITHUB_REF_NAME
          $version = $tag.Substring(1)
          $sourcePath = Join-Path ./release-notes "$tag.md"
          $destinationPath = Join-Path ./out "incident-capsule-$version.release-notes.md"

          if (-not (Test-Path -LiteralPath $sourcePath -PathType Leaf)) {
              throw "Curated release notes are missing: $sourcePath"
          }

          $notes = Get-Content -LiteralPath $sourcePath -Raw -ErrorAction Stop
          if ([string]::IsNullOrWhiteSpace($notes)) {
              throw "Curated release notes are empty: $sourcePath"
          }

          Copy-Item -LiteralPath $sourcePath -Destination $destinationPath

      - name: Validate release asset set
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $archives = @(Get-ChildItem ./out/incident-capsule-*.zip -File)
          $checksums = @(Get-ChildItem ./out/incident-capsule-*.zip.sha256 -File)
          $releaseNotes = @(Get-ChildItem ./out/incident-capsule-*.release-notes.md -File)

          if ($archives.Count -ne 1) {
              throw "Expected exactly one release archive, found $($archives.Count)."
          }

          if ($checksums.Count -ne 1) {
              throw "Expected exactly one checksum file, found $($checksums.Count)."
          }

          if ($releaseNotes.Count -ne 1) {
              throw "Expected exactly one curated release-notes file, found $($releaseNotes.Count)."
          }
          Write-Host "Archive: $($archives[0].Name)"
          Write-Host "Checksum: $($checksums[0].Name)"
          Write-Host "Release notes: $($releaseNotes[0].Name)"

      - name: Attest release assets
        uses: actions/attest@v4
        with:
          subject-path: |
            ${{ github.workspace }}/out/incident-capsule-*.zip
            ${{ github.workspace }}/out/incident-capsule-*.zip.sha256

      - name: Store validated release assets
        uses: actions/upload-artifact@v7
        with:
          name: release-assets
          path: |
            out/incident-capsule-*.zip
            out/incident-capsule-*.zip.sha256
            out/incident-capsule-*.release-notes.md
          if-no-files-found: error
          retention-days: 7

  publish-release:
    name: Publish immutable GitHub release
    needs: validate-package
    runs-on: windows-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Download validated release assets
        uses: actions/download-artifact@v8
        with:
          name: release-assets
          path: release-assets

      - name: Publish new GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          $ErrorActionPreference = 'Stop'

          $tag = $env:GITHUB_REF_NAME
          $releaseNotes = @(
              Get-ChildItem `
                -Path ./release-assets/incident-capsule-*.release-notes.md `
                -File
          )
          $assetPaths = @(
              Get-ChildItem `
                -Path ./release-assets/incident-capsule-*.zip, ./release-assets/incident-capsule-*.zip.sha256 `
                -File |
              Sort-Object FullName |
              Select-Object -ExpandProperty FullName
          )

          if ($assetPaths.Count -ne 2) {
              throw "Expected exactly two release assets, found $($assetPaths.Count)."
          }

          if ($releaseNotes.Count -ne 1) {
              throw "Expected exactly one curated release-notes file, found $($releaseNotes.Count)."
          }
          $releaseNotesPath = $releaseNotes[0].FullName

          $archivePath = @($assetPaths | Where-Object { $_ -match '\.zip$' })[0]
          $checksumPath = "$archivePath.sha256"
          $checksumLine = (Get-Content -LiteralPath $checksumPath -Raw).Trim()

          if ($checksumLine -notmatch '^(?<Hash>[0-9a-fA-F]{64})  (?<File>[^\\/]+)$') {
              throw "Invalid checksum sidecar format: $checksumPath"
          }

          if ($Matches['File'] -ne (Split-Path -Leaf $archivePath)) {
              throw 'Checksum sidecar names a different release archive.'
          }

          $actualHash = (Get-FileHash -LiteralPath $archivePath -Algorithm SHA256).Hash
          if ($actualHash -ne $Matches['Hash']) {
              throw 'Downloaded release asset does not match its SHA-256 sidecar.'
          }

          $previousPreference = $ErrorActionPreference
          $ErrorActionPreference = 'Continue'
          gh release view $tag --json tagName *> $null
          $releaseExists = $LASTEXITCODE -eq 0
          $ErrorActionPreference = $previousPreference

          if ($releaseExists) {
              throw (
                  "Release '$tag' already exists. Published release assets are immutable " +
                  'and will not be overwritten.'
              )
          }

          gh release create `
            $tag `
            @assetPaths `
            --verify-tag `
            --notes-file $releaseNotesPath `
            --title "Incident Capsule $tag"

          if ($LASTEXITCODE -ne 0) {
              throw "GitHub release command failed with exit code $LASTEXITCODE."
          }
