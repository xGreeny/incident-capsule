name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

env:
  PESTER_VERSION: '5.9.0'
  PSSCRIPTANALYZER_VERSION: '1.25.0'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Validate, package and publish version
    runs-on: windows-latest
    timeout-minutes: 35

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Resolve release version
        id: version
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = 'Stop'
          $manifest = Test-ModuleManifest `
            -Path ./src/IncidentCapsule/IncidentCapsule.psd1 `
            -ErrorAction Stop

          $tag = "v$($manifest.Version)"
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
              "publish=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
              Write-Host "Release $tag already exists; no mutable replacement will be published."
          }
          else {
              "publish=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
              Write-Host "Release $tag will be validated and published from $env:GITHUB_SHA."
          }

      - name: Install build dependencies
        if: steps.version.outputs.publish == 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted

          Install-Module `
            -Name Pester `
            -RequiredVersion $env:PESTER_VERSION `
            -Scope CurrentUser `
            -Force `
            -SkipPublisherCheck `
            -AllowClobber

          Install-Module `
            -Name PSScriptAnalyzer `
            -RequiredVersion $env:PSSCRIPTANALYZER_VERSION `
            -Scope CurrentUser `
            -Force `
            -AllowClobber

      - name: Validate and package
        if: steps.version.outputs.publish == 'true'
        shell: pwsh
        run: ./build.ps1 -Task All

      - name: Validate release assets
        if: steps.version.outputs.publish == 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $archives = @(Get-ChildItem -Path ./out/incident-capsule-*.zip -File -ErrorAction Stop)
          $checksums = @(Get-ChildItem -Path ./out/incident-capsule-*.zip.sha256 -File -ErrorAction Stop)

          if ($archives.Count -ne 1) {
              throw "Expected exactly one release archive, found $($archives.Count)."
          }
          if ($checksums.Count -ne 1) {
              throw "Expected exactly one checksum file, found $($checksums.Count)."
          }

      - name: Publish immutable GitHub release
        if: steps.version.outputs.publish == 'true'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          $ErrorActionPreference = 'Stop'
          $assetPaths = @(
              Get-ChildItem `
                -Path ./out/incident-capsule-*.zip, ./out/incident-capsule-*.zip.sha256 `
                -File |
              Sort-Object FullName |
              Select-Object -ExpandProperty FullName
          )

          $notesPath = Join-Path './release-notes' "$env:RELEASE_TAG.md"
          $arguments = @(
              'release', 'create', $env:RELEASE_TAG,
              '--target', $env:GITHUB_SHA,
              '--title', "Incident Capsule $env:RELEASE_TAG"
          )
          if (Test-Path -LiteralPath $notesPath -PathType Leaf) {
              $arguments += @('--notes-file', $notesPath)
          }
          else {
              $arguments += '--generate-notes'
          }
          $arguments += $assetPaths

          & gh @arguments
          if ($LASTEXITCODE -ne 0) {
              throw "GitHub release creation failed with exit code $LASTEXITCODE."
          }
